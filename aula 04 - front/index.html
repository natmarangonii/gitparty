<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Lista de Eventos</h1>
        <button onclick="abrirModal()">+ Novo Evento</button>
    </header>

    <main>
        <section id="listaEventos"></section>
    </main>

    <div id="modalEvento" class="modal">
        <form id="cadEvento" class="modal-content">
            <h2>Novo Evento</h2>

            <input type="text" name="titulo" placeholder="Título do evento" required>
            <input type="date" name="data" required>
            <input type="text" name="local" placeholder="Local" required>
            <textarea name="descricao" placeholder="Descrição do evento"></textarea>

            <div class="modal-buttons">
                <button type="submit">Salvar</button>
                <button type="reset" onclick="fecharModal()">Cancelar</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
